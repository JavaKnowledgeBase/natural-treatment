server:
  port: 8000

spring:
  application:
    name: orchestrator
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}

session:
  idle-timeout-seconds: ${SESSION_IDLE_TIMEOUT_SECONDS:1800}

agents:
  intake-url: ${INTAKE_SERVICE_URL:http://agent-intake:8000}
  mapping-url: ${MAPPING_SERVICE_URL:http://agent-mapping:8000}
  retrieval-url: ${RETRIEVAL_SERVICE_URL:http://agent-retrieval:8000}
  safety-url: ${SAFETY_SERVICE_URL:http://agent-safety:8000}
  scoring-url: ${SCORING_SERVICE_URL:http://agent-scoring:8000}
  explanation-url: ${EXPLANATION_SERVICE_URL:http://agent-explanation:8000}
  reporting-url: ${REPORTING_SERVICE_URL:http://agent-reporting:8000}
  email-url: ${EMAIL_SERVICE_URL:http://email:8000}

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{correlationId}] %-5level %logger{36} - %msg%n"
