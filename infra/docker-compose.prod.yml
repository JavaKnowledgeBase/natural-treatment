# Production overlay -- adds the reverse proxy that terminates TLS in
# front of the stack. Applied on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Deliberately doesn't touch frontend/gateway's existing host port
# mappings from docker-compose.yml (3000, 8082) -- no need to strip them
# for security, since the VM's firewall (see docs/DEPLOYMENT.md §7) only
# allows inbound 80/443 in the first place. Leaving them as-is also keeps
# SSH-tunnel debugging against those ports working unchanged.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_started

  gateway:
    environment:
      CORS_ALLOW_ORIGINS: https://naturalremedyresearch.com,https://www.naturalremedyresearch.com

  frontend:
    build:
      args:
        NEXT_PUBLIC_GATEWAY_URL: https://api.naturalremedyresearch.com
    environment:
      NEXT_PUBLIC_GATEWAY_URL: https://api.naturalremedyresearch.com
