# Reverse proxy for production. Terminates TLS using a Cloudflare Origin
# Certificate (see docs/DEPLOYMENT.md §9) -- Cloudflare's edge handles the
# public-facing cert/HTTPS for visitors; this cert only needs to satisfy
# Cloudflare's "Full" SSL/TLS mode for the edge-to-origin hop, so it never
# needs to be from a public CA.
#
# Two hostnames, subdomain split (not path-based) per the agreed plan:
#   naturalremedyresearch.com     -> frontend (Next.js, container port 3000)
#   api.naturalremedyresearch.com -> gateway  (container port 8000, same
#                                     internal-port contract every service
#                                     in this app follows)

server {
    listen 80;
    server_name naturalremedyresearch.com www.naturalremedyresearch.com api.naturalremedyresearch.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name naturalremedyresearch.com www.naturalremedyresearch.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name api.naturalremedyresearch.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    location / {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
