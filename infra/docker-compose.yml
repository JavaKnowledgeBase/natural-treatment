x-backend-service: &backend-service
  env_file:
    - ../.env
  environment:
    REDIS_URL: redis://redis:6379/0
  depends_on:
    redis:
      condition: service_healthy

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Runs once, loads seed/data/*.json into the Tier 1 Redis cache, exits.
  # This used to happen implicitly on every Python knowledge service's own
  # FastAPI startup (see seed/load_seed.py's docstring) -- when those
  # services were migrated to Java, that startup hook had nowhere to live
  # (the Java RefCacheServices are read-only by design, see
  # docs/TECHNICAL_GUIDE.md §0/§5), so nothing was left calling load_seed()
  # at all. Tier 1 data has a 6h TTL (shared/shared/cache.py's
  # REF_TTL_SECONDS) and nothing was refreshing it -- it silently emptied
  # out the first time a long-running stack outlived that TTL, which is
  # a real bug found live (see CLAUDE.md). This service restores the
  # "reseed on every stack startup" property, just as its own explicit
  # step instead of buried in a service that no longer owns it.
  seed-loader:
    <<: *backend-service
    build:
      context: ..
      dockerfile: seed/Dockerfile
    restart: "no"

  # Long-running companion to seed-loader: reseeds Tier 1 on a fixed
  # interval (default 1h, well under REF_TTL_SECONDS' 6h) so a stack left
  # running for days/weeks doesn't silently go empty between deploys.
  # Nothing depends_on this -- only seed-loader (above) gates startup
  # ordering -- so a slow/restarting refresher can't block the rest of
  # the stack from coming up.
  seed-refresher:
    <<: *backend-service
    build:
      context: ..
      dockerfile: seed/Dockerfile
    command: ["python", "-u", "-m", "seed.load_seed", "--loop"]
    restart: unless-stopped

  knowledge-botanical:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/knowledge/botanical/Dockerfile
    ports:
      - "8090:8000"
    depends_on:
      redis:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully

  knowledge-compound:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/knowledge/compound/Dockerfile
    ports:
      - "8091:8000"
    depends_on:
      redis:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully

  knowledge-toxicology:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/knowledge/toxicology/Dockerfile
    ports:
      - "8092:8000"
    depends_on:
      redis:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully

  knowledge-rules:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/knowledge/rules/Dockerfile
    ports:
      - "8093:8000"
    depends_on:
      redis:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully

  agent-intake:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/intake/Dockerfile
    ports:
      - "8100:8000"
    depends_on:
      redis:
        condition: service_healthy
      knowledge-toxicology:
        condition: service_started

  agent-mapping:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/mapping/Dockerfile
    ports:
      - "8101:8000"
    depends_on:
      redis:
        condition: service_healthy
      knowledge-toxicology:
        condition: service_started

  agent-retrieval:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/retrieval/Dockerfile
    ports:
      - "8102:8000"
    depends_on:
      redis:
        condition: service_healthy
      knowledge-botanical:
        condition: service_started
      knowledge-compound:
        condition: service_started

  agent-safety:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/safety/Dockerfile
    ports:
      - "8103:8000"
    depends_on:
      redis:
        condition: service_healthy
      knowledge-rules:
        condition: service_started

  agent-scoring:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/scoring/Dockerfile
    ports:
      - "8104:8000"

  agent-explanation:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/explanation/Dockerfile
    ports:
      - "8105:8000"

  agent-reporting:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/agents/reporting/Dockerfile
    ports:
      - "8106:8000"

  email:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/email/Dockerfile
    ports:
      - "8110:8000"

  orchestrator:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8081:8000"
    depends_on:
      redis:
        condition: service_healthy
      agent-intake:
        condition: service_started
      agent-mapping:
        condition: service_started
      agent-retrieval:
        condition: service_started
      agent-safety:
        condition: service_started
      agent-scoring:
        condition: service_started
      agent-explanation:
        condition: service_started
      agent-reporting:
        condition: service_started
      email:
        condition: service_started

  gateway:
    <<: *backend-service
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8082:8000"
    depends_on:
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined at build time -- this must be a
        # build arg, not just the runtime `environment:` below, or a real
        # `next build` would silently bake in nothing. Reads from .env via
        # Compose's own ${VAR} substitution (not env_file:, which only
        # reaches the container's runtime environment, too late for this).
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8082}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8082}
    depends_on:
      - gateway
